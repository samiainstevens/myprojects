<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="projects by sam iain stevens">
<meta name="theme-color" content="#0a0a0a">
<title>projects</title>
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #e0e0e0;
    --muted: rgba(224, 224, 224, 0.7);
    --link: rgba(224, 224, 224, 0.9);
    --link-hover: #ffffff;
  }
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Garamond', 'EB Garamond', 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
  }
  body {
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
  }
  h1 {
    width: 100%;
    text-align: center;
    font-size: clamp(1.5rem, 2vw + 1rem, 2.2rem);
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: lowercase;
    margin-top: 8px;
  }
  main {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .links {
    width: min(92vw, 560px);
    display: grid;
    gap: 18px;
    text-align: center;
    justify-items: center;
  }
  .links a {
    color: var(--link);
    text-decoration: none;
    font-size: clamp(1.05rem, 1.2vw + 0.8rem, 1.3rem);
    line-height: 1.3;
    transition: color 0.2s ease;
  }
  .links a:hover,
  .links a:focus-visible {
    color: var(--link-hover);
  }
  .copyright {
    margin-top: 8px;
    color: var(--muted);
    font-size: clamp(0.95rem, 0.7vw + 0.8rem, 1.05rem);
    text-transform: lowercase;
  }
</style>
</head>
<body>
  <h1>projects</h1>
  <main>
    <div class="links">
      <a href="https://samiainstevens.github.io/typedup/" target="_blank" rel="noopener">typewritten font emulator</a>
      <a href="https://samiainstevens.github.io/audiovisualiser/" target="_blank" rel="noopener">audio visualiser</a>
      <a href="https://samiainstevens.github.io/wage-cuck/" target="_blank" rel="noopener">wage counter</a>
      <a href="https://samiainstevens.com/" target="_blank" rel="noopener">photography</a>
      <a href="https://buymeacoffee.com/samiainstevens" target="_blank" rel="noopener">buy me a coffee</a>
      <p class="copyright">&copy; sam iain stevens 2026</p>
    </div>
  </main>
</body>
</html>
